name: Build & Release

# Build every distributable target via scripts/ghost.js.
# Runs on every push (any branch) and on version tags (v*); also manual.
on:
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Publish a GitHub Release from built artifacts (uses v<package.json version> when not on a tag)"
        type: boolean
        default: false
  push:
    branches:
      - "**"
    tags:
      - "v*"

# A new push to the same ref cancels any build still running for it.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write # needed for the optional release step on tags

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    # All targets build in parallel (each on its own runner).
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux
            os: ubuntu-22.04
            target: linux
          - name: windows-x64
            os: windows-latest
            target: win:64
          - name: windows-arm64
            os: windows-latest
            target: win:arm
          - name: macos-intel
            os: macos-latest
            target: mac:intel
          - name: macos-arm64
            os: macos-latest
            target: mac:arm
          - name: macos-universal
            os: macos-latest
            target: mac:universal

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      # Universal/intel/arm all need both Apple arch targets present.
      - name: Add macOS Rust targets
        if: runner.os == 'macOS'
        run: rustup target add x86_64-apple-darwin aarch64-apple-darwin

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      # Linux-only: system libraries Tauri needs to build the WebView/bundle.
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            curl wget file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev

      # ghost.js runs `npm install` itself, but doing it here uses the npm cache.
      - name: Install dependencies
        run: npm ci

      - name: Build ${{ matrix.target }}
        run: npm run ghost build ${{ matrix.target }}

      # Linux produces three installers — upload each separately so Actions
      # downloads are one file per artifact instead of one bundled zip.
      - name: Upload Linux AppImage
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: ghost-shell-linux-appimage
          path: build/*.AppImage
          if-no-files-found: error
          retention-days: 14

      - name: Upload Linux deb
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: ghost-shell-linux-deb
          path: build/*.deb
          if-no-files-found: error
          retention-days: 14

      - name: Upload Linux rpm
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: ghost-shell-linux-rpm
          path: build/*.rpm
          if-no-files-found: error
          retention-days: 14

      - name: Upload artifacts
        if: runner.os != 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: ghost-shell-${{ matrix.name }}
          path: build/**
          if-no-files-found: error
          retention-days: 14

  # Publish installers to GitHub Releases after every successful main build,
  # on version tags, or when manually triggered with publish_release.
  release:
    name: Release
    needs: build
    if: >-
      needs.build.result == 'success' &&
      (
        startsWith(github.ref, 'refs/tags/v') ||
        (github.event_name == 'workflow_dispatch' && inputs.publish_release) ||
        (github.event_name == 'push' && github.ref == 'refs/heads/main')
      )
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Flatten release assets
        run: |
          mkdir -p release-assets
          find artifacts -type f -exec cp -n {} release-assets/ \;
          ls -la release-assets/
          if [ -z "$(ls -A release-assets)" ]; then
            echo "No release assets found — build artifacts may be missing."
            exit 1
          fi

      - name: Resolve release tag
        id: tag
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "name=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            VERSION=$(node -p "require('./package.json').version")
            echo "name=v${VERSION}" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.tag.outputs.name }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" release-assets/* --clobber
          else
            gh release create "$TAG" \
              --target "${{ github.sha }}" \
              --title "Ghost Shell ${TAG}" \
              --generate-notes \
              release-assets/*
          fi
